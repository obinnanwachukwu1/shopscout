<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopScout Chat</title>
  <style>
    html, body {
      height: 100%;
    }
    :root {
      color-scheme: light;
      --bg: #f4f5f8;
      --surface: #ffffff;
      --surface-muted: #f8f9fb;
      --border: #d7dce6;
      --border-strong: #c0c6d2;
      --text-primary: #1f2937;
      --text-secondary: #556070;
      --accent: #2f4f7f;
      --accent-strong: #253c62;
      --accent-soft: #e5ecf8;
      --assistant-accent: #3a6658;
      --assistant-soft: #e3f1ed;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow-lg: 0 22px 44px -28px rgba(24, 32, 45, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* (removed Lucide; using emojis again) */

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.6;
      height: 100vh; /* lock viewport height */
      padding: 0; /* no padding around the window */
      display: flex;
      justify-content: center;
      align-items: stretch;
      overflow: hidden; /* prevent page-level scrolling */
    }

    .chat-shell {
      width: min(640px, 100%);
      height: 100vh; /* occupy full viewport */
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; /* stick to the top */
      top: 0;
      z-index: 20;
    }

    .chat-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .chat-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: var(--accent-soft);
      overflow: hidden;
    }

    .chat-icon img {
      width: 24px;
      height: 24px;
      display: block;
    }

    .product-badge {
      flex-shrink: 0;
      max-width: 240px;
      padding: 6px 12px;
      border-radius: 9999px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-soft);
      font-size: 12px;
      color: var(--accent-strong);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-body {
      flex: 1;
      display: flex;            /* allow messages to flex */
      flex-direction: column;
      background: var(--surface-muted);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      overflow: hidden;         /* contain scroll to messages */
    }

    .chat-messages {
      flex: 1;                  /* take remaining height */
      overflow-y: auto;         /* only this scrolls */
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overscroll-behavior: contain; /* avoid body scroll chaining */
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 90%;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.status {
      align-self: center;
      max-width: 100%;
      gap: 8px;
      opacity: 0.9;
    }

    .message-avatar {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #ffffff;
      background: var(--assistant-accent);
      flex-shrink: 0;
      overflow: hidden;
    }

    .message-avatar img {
      width: 20px;
      height: 20px;
      display: block;
    }

    .message.user .message-avatar {
      background: var(--accent);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .message.status .message-avatar {
      background: var(--accent-soft);
      border: 1px solid rgba(47, 79, 127, 0.25);
      color: inherit;
    }

    .message-avatar[data-variant="status-search"] {
      background: var(--accent-soft);
      border-color: rgba(47, 79, 127, 0.35);
    }

    .message-avatar[data-variant="status-success"] {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.4);
    }

    .message-avatar[data-variant="status-error"] {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.45);
    }

    .message-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      color: var(--text-primary);
      word-wrap: break-word;
      line-height: 1.6;
    }

    .message.assistant .message-content {
      background: var(--assistant-soft);
      border-color: transparent;
      color: var(--text-primary);
    }

    .message.user .message-content {
      background: var(--accent);
      border-color: transparent;
      color: #ffffff;
    }

    .message.status .message-content {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 4px 0;
    }

    .message-text {
      white-space: pre-wrap;
    }

    .message.assistant.streaming .message-text {
      min-height: 22px;
    }

    .message-status-primary {
      font-weight: 500;
    }

    .message-status-secondary {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .message-status-secondary:empty {
      display: none;
    }

    .message-status-summary {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
    }

    .message-status-summary[hidden] {
      display: none;
    }

    .message-status-summary summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      list-style: none;
      outline: none;
      border-radius: inherit;
    }

    .message-status-summary summary::-webkit-details-marker {
      display: none;
    }

    .message-status-summary summary::before {
      content: '▸';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
      font-size: 12px;
      color: var(--accent-strong);
      transition: transform 0.2s ease;
    }

    .message-status-summary[open] summary::before {
      transform: rotate(90deg);
    }

    .message-status-summary summary:hover {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .message-status-summary[open] summary {
      background: rgba(47, 79, 127, 0.08);
      color: var(--text-primary);
    }

    .message-status-summary-body {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface-muted);
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .message-source {
      margin-top: 10px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .message-source:hover {
      color: var(--accent-strong);
    }

    .typing-indicator {
      display: none;
      align-items: center;
      gap: 12px;
    }

    .typing-indicator.active {
      display: flex;
    }

    .typing-indicator .message-avatar {
      background: var(--assistant-accent);
    }

    .typing-dots {
      display: inline-flex;
      gap: 6px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
      opacity: 0.6;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    .chat-input-container {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      position: sticky; /* stick to the bottom */
      bottom: 0;
      z-index: 20;
    }

    .chat-input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      min-height: 48px;
      max-height: 140px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface-muted);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .chat-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.15);
      background: #ffffff;
    }

    .send-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 20px;
      height: 48px;
      border-radius: var(--radius-md);
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease, border-color 0.2s ease;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
      transform: translateY(-1px);
    }

    .send-btn:disabled {
      background: var(--surface-muted);
      color: var(--text-secondary);
      border-color: var(--border);
      cursor: not-allowed;
      transform: none;
    }

    .send-btn-icon {
      font-size: 16px;
      line-height: 1;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      padding: 36px 28px;
      border-radius: var(--radius-lg);
      border: 1px dashed var(--border);
      background: var(--surface);
      max-width: 360px;
      color: var(--text-secondary);
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 20px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .empty-icon img {
      width: 40px;
      height: 40px;
      display: block;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .empty-message {
      font-size: 13px;
      margin-bottom: 20px;
      color: var(--text-secondary);
    }

    .suggested-questions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .suggested-question {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text-primary);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s ease, background-color 0.2s ease, transform 0.2s ease;
    }

    .suggested-question:hover {
      background: #ffffff;
      border-color: var(--accent);
      transform: translateX(4px);
    }

    @media (max-width: 520px) {
      body {
        padding: 0;
      }

      .chat-shell {
        border-radius: var(--radius-md);
      }

      .chat-header,
      .chat-input-container {
        padding: 16px;
      }

      .chat-messages {
        padding: 20px 16px;
      }

      .product-badge {
        max-width: 160px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-shell">
    <header class="chat-header">
      <div class="chat-title">
        <span class="chat-icon" aria-hidden="true">
          <img src="icons/icon48.png" alt="">
        </span>
        <span>Ask Questions</span>
      </div>
      <div class="product-badge" id="productBadge">No product selected</div>
    </header>

    <main class="chat-body">
      <div class="chat-messages" id="chatMessages">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <img src="icons/icon48.png" alt="">
          </div>
          <div class="empty-title">Ask about this product</div>
          <div class="empty-message">
            Curious about specs, pricing, standout reviews, or how it compares? I'm ready whenever you are.
          </div>
          <div class="suggested-questions" id="suggestedQuestions">
            <button class="suggested-question">What are the main complaints in the reviews?</button>
            <button class="suggested-question">Is this a good value for the price?</button>
            <button class="suggested-question">What are the product dimensions?</button>
            <button class="suggested-question">Does this work with...?</button>
          </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
          <div class="message-avatar">
            <img src="icons/icon16.png" alt="">
          </div>
          <div class="typing-dots">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="chat-input-container">
      <div class="chat-input-wrapper">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="Ask a question about this product..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn">
          <span class="send-btn-icon" aria-hidden="true">➤</span>
        </button>
      </div>
    </footer>
  </div>

  <script src="chat.js" type="module"></script>
</body>
</html>
